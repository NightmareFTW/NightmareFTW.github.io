<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightmareFTW · Gaming Tools Hub</title>
  <meta name="description" content="A growing collection of tools for the games I play.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">
        <span class="brand-mark">▲</span>
        <span class="brand-name">Nightmare<span class="accent">FTW</span></span>
      </a>
      <nav class="top-nav">
        <a href="index.html" class="active">Hub</a>
        <a href="https://github.com/NightmareFTW" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <p class="kicker">// gaming tools hub</p>
      <h1>Less grind, <span class="accent">more game</span>.</h1>
      <p class="lead">A growing toolbox — calculators, checklists and trackers. Nothing gets removed; it just keeps growing.</p>
    </section>

    <section class="games" aria-label="Games">
      <div class="section-head">
        <h2>Games</h2>
        <span class="count" id="game-count"></span>
      </div>

      <div class="list-controls">
        <input type="search" id="game-search" class="search-input" placeholder="Search games…" autocomplete="off">
        <select id="game-sort" class="sort-select">
          <option value="default">Sort: Default</option>
          <option value="az">Name A–Z</option>
          <option value="za">Name Z–A</option>
          <option value="tools">Most tools</option>
        </select>
        <div class="view-toggle" id="view-toggle">
          <button data-view="grid" class="active" title="Grid">▦</button>
          <button data-view="list" title="List">≣</button>
          <button data-view="compact" title="Compact">≡</button>
        </div>
      </div>

      <div class="game-grid" id="game-grid"><!-- populated by JS --></div>
      <p id="no-results" class="no-results" style="display:none">No games match your search.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>Built by NightmareFTW.</span>
    </div>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/home.js"></script>
  <script src="/assets/js/i18n.js" defer></script>
</body>
</html>
