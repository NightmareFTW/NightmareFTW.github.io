<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="The Other Side">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1416"/>
      <stop offset="0.55" stop-color="#0e2429"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <radialGradient id="portal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7fe9dc" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#3ba99c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3ba99c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fog" cx="0.5" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#3ba99c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3ba99c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#fog)"/>

  <!-- doorway to "the other side": a cold-light rift down the middle-right -->
  <g transform="translate(880 210)">
    <ellipse cx="0" cy="0" rx="230" ry="250" fill="url(#portal)" filter="url(#blur)"/>
    <path d="M -46 -150 Q -70 0 -40 150 L 40 150 Q 70 0 46 -150 Z" fill="#0a1416" opacity="0.9"/>
    <path d="M -46 -150 Q -70 0 -40 150 L 40 150 Q 70 0 46 -150 Z" fill="none" stroke="#8ff0e3" stroke-width="2.5" opacity="0.85"/>
    <!-- a faint figure standing in the doorway -->
    <g fill="#06110f" opacity="0.92">
      <ellipse cx="0" cy="-42" rx="16" ry="18"/>
      <path d="M -22 150 Q -26 10 0 -22 Q 26 10 22 150 Z"/>
    </g>
  </g>

  <!-- EMF signal bars, lower-left, as a ghost-hunting motif -->
  <g transform="translate(150 300)" fill="#3ba99c">
    <rect x="0" y="20" width="16" height="30" rx="3" opacity="0.55"/>
    <rect x="26" y="0" width="16" height="50" rx="3" opacity="0.7"/>
    <rect x="52" y="-24" width="16" height="74" rx="3" opacity="0.9"/>
    <rect x="78" y="-8" width="16" height="58" rx="3" opacity="0.75"/>
    <rect x="104" y="14" width="16" height="36" rx="3" opacity="0.5"/>
  </g>

  <!-- faint drifting orbs -->
  <circle cx="430" cy="120" r="5" fill="#8ff0e3" opacity="0.7"/>
  <circle cx="520" cy="200" r="3" fill="#8ff0e3" opacity="0.5"/>
  <circle cx="360" cy="230" r="4" fill="#8ff0e3" opacity="0.55"/>

  <!-- title -->
  <text x="120" y="180" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="30" letter-spacing="10" fill="#7fe9dc" opacity="0.85">CO-OP · GHOST HUNT</text>
  <text x="118" y="248" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="#f2fbfa">The Other Side</text>
</svg>
