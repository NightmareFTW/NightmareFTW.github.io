<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="God of War Ragnarök">
  <defs>
    <linearGradient id="gwSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070f1a"/>
      <stop offset="0.45" stop-color="#0c2030"/>
      <stop offset="0.8" stop-color="#123042"/>
      <stop offset="1" stop-color="#0a1622"/>
    </linearGradient>
    <linearGradient id="gwAur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43e8b0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#37d0c0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2a6fb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gwName" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d488"/><stop offset="1" stop-color="#c79a3e"/>
    </linearGradient>
    <radialGradient id="gwBif" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#bfe9ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#bfe9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="gwG"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#gwSky)"/>
  <!-- stars -->
  <g fill="#cfe6f5"><circle cx="90" cy="60" r="1.4"/><circle cx="180" cy="40" r="1"/><circle cx="300" cy="70" r="1.2"/><circle cx="520" cy="45" r="1"/><circle cx="640" cy="65" r="1.4"/><circle cx="720" cy="35" r="1"/><circle cx="420" cy="30" r="1"/></g>
  <!-- aurora ribbons -->
  <path d="M0 70 Q200 30 400 90 T800 80 L800 170 Q600 120 400 170 T0 160 Z" fill="url(#gwAur)" filter="url(#gwG)" opacity="0.8"/>
  <!-- bifrost beam -->
  <polygon points="380,0 420,0 470,300 330,300" fill="url(#gwBif)" opacity="0.7"/>

  <!-- runic ring glow behind title -->
  <g transform="translate(400,150)" fill="none" stroke="#c79a3e" stroke-width="1.6" opacity="0.4">
    <circle r="60"/><circle r="50" stroke-width="0.8"/>
  </g>

  <!-- far peaks -->
  <path d="M0 300 L120 215 L210 285 L320 230 L430 300 L560 225 L690 300 L800 255 L800 320 L0 320 Z" fill="#0e2333" opacity="0.8"/>
  <!-- snowy ridge (foreground) -->
  <path d="M0 360 L150 300 L300 345 L430 295 L560 350 L700 300 L800 345 L800 450 L0 450 Z" fill="#0a161f"/>
  <path d="M0 360 L150 300 L300 345 L430 295 L560 350 L700 300 L800 345 L800 366 Q600 340 430 360 Q250 380 0 366 Z" fill="#16313f" opacity="0.7"/>

  <!-- Kratos (large) + Atreus (small) silhouettes on the ridge -->
  <g fill="#05090d">
    <!-- Kratos -->
    <path d="M362 300c8-2 15 3 16 11l2 13 9 7-3 22 5 8-5 6 4 26h-13l-4-26-5 26h-14l5-30-4-30-7-6 6-7 3-12c1-7 3-9 5-9z"/>
    <!-- leviathan axe in hand -->
    <path d="M388 320l16-10 7 9-3 7-8 1-10 2z" />
    <rect x="384" y="328" width="6" height="34"/>
    <!-- Atreus (smaller, with bow) -->
    <path d="M452 322c5-1 10 2 11 8l1 9 6 5-3 16 3 6-4 4 3 18h-9l-3-18-3 18h-9l3-20-3-20-5-4 4-5 2-8c1-5 2-7 3-7z"/>
    <path d="M470 326q14 14 0 40" fill="none" stroke="#05090d" stroke-width="2"/>
  </g>

  <!-- titles -->
  <text x="400" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="28" fill="#e8eef2" letter-spacing="11">GOD OF WAR</text>
  <text x="400" y="205" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="54" fill="url(#gwName)" letter-spacing="5" stroke="#1c1408" stroke-width="0.8">RAGNARÖK</text>
</svg>
