<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="God of War Ragnarök">
  <defs>
    <linearGradient id="gwSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1622"/>
      <stop offset="0.6" stop-color="#0c1a26"/>
      <stop offset="1" stop-color="#050b12"/>
    </linearGradient>
    <linearGradient id="gwAurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6f6a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#37d0c0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b6fb5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gwGlow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#cdaa53" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#cdaa53" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#gwSky)"/>
  <rect x="0" y="60" width="800" height="120" fill="url(#gwAurora)"/>
  <rect width="800" height="450" fill="url(#gwGlow)"/>

  <!-- snowy mountains -->
  <g>
    <path d="M0 360 L150 200 L260 320 L360 230 L470 350 L600 210 L720 330 L800 270 L800 450 L0 450 Z" fill="#0e1f2c"/>
    <path d="M0 360 L150 200 L200 265 L120 360 Z" fill="#16303f" opacity="0.7"/>
    <path d="M360 230 L470 350 L400 360 L320 300 Z" fill="#16303f" opacity="0.6"/>
    <path d="M600 210 L720 330 L660 360 L560 300 Z" fill="#16303f" opacity="0.6"/>
  </g>

  <!-- runic ring -->
  <g transform="translate(400,205)" fill="none" stroke="#cdaa53" stroke-width="2" opacity="0.5">
    <circle r="92"/>
    <circle r="78" stroke-width="1"/>
    <g stroke-width="2.4">
      <path d="M-18 -64 l0 30 M-18 -64 l14 8"/><path d="M18 -64 l0 30 M18 -64 l-14 8"/>
      <path d="M64 -18 l-30 0 M64 -18 l-8 14"/><path d="M64 18 l-30 0 M64 18 l-8 -14"/>
      <path d="M18 64 l0 -30 M18 64 l-14 -8"/><path d="M-18 64 l0 -30 M-18 64 l14 -8"/>
      <path d="M-64 18 l30 0 M-64 18 l8 -14"/><path d="M-64 -18 l30 0 M-64 -18 l8 14"/>
    </g>
  </g>

  <!-- title -->
  <text x="400" y="290" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="30" fill="#e8eef2" letter-spacing="10">GOD OF WAR</text>
  <text x="400" y="346" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="56" fill="#cdaa53" letter-spacing="6">RAGNARÖK</text>
</svg>
