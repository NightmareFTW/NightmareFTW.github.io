<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cyberpunk 2077">
  <defs>
    <linearGradient id="cpSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0d3a"/>
      <stop offset="0.42" stop-color="#7a1f5a"/>
      <stop offset="0.72" stop-color="#e05a2a"/>
      <stop offset="0.9" stop-color="#fcb415"/>
      <stop offset="1" stop-color="#fcee0a"/>
    </linearGradient>
    <linearGradient id="cpFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08060c" stop-opacity="0"/>
      <stop offset="1" stop-color="#08060c"/>
    </linearGradient>
    <linearGradient id="cpName" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcee0a"/><stop offset="1" stop-color="#f5b400"/>
    </linearGradient>
    <filter id="cpG"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <rect width="800" height="450" fill="url(#cpSky)"/>
  <!-- sun -->
  <circle cx="400" cy="300" r="120" fill="#fff3b0" opacity="0.55" filter="url(#cpG)"/>
  <circle cx="400" cy="300" r="78" fill="#fff7c8" opacity="0.85"/>

  <!-- far skyline -->
  <g fill="#3a1840" opacity="0.85">
    <rect x="20" y="210" width="48" height="160"/><rect x="80" y="250" width="34" height="120"/>
    <rect x="700" y="225" width="46" height="145"/><rect x="650" y="255" width="34" height="115"/>
    <rect x="120" y="270" width="28" height="100"/><rect x="620" y="270" width="24" height="100"/>
  </g>
  <!-- mid skyline -->
  <g fill="#190a22">
    <rect x="40" y="250" width="60" height="150"/><rect x="105" y="290" width="44" height="110"/>
    <rect x="150" y="225" width="70" height="175"/><polygon points="150,225 185,200 220,225"/>
    <rect x="560" y="240" width="58" height="160"/><rect x="624" y="280" width="44" height="120"/>
    <rect x="672" y="215" width="74" height="185"/><polygon points="672,215 709,188 746,215"/>
    <rect x="700" y="150" width="8" height="65"/><rect x="185" y="170" width="6" height="55"/>
  </g>
  <!-- neon strips -->
  <g opacity="0.9">
    <rect x="60" y="270" width="5" height="70" fill="#19e3ff"/><rect x="170" y="245" width="5" height="80" fill="#ff2e88"/>
    <rect x="585" y="260" width="5" height="80" fill="#19e3ff"/><rect x="690" y="240" width="5" height="95" fill="#ff2e88"/>
    <rect x="120" y="300" width="4" height="50" fill="#ff2e88"/><rect x="640" y="300" width="4" height="55" fill="#19e3ff"/>
  </g>

  <!-- foreground street + figure (V) -->
  <rect x="0" y="368" width="800" height="82" fill="url(#cpFade)"/>
  <g fill="#050308">
    <path d="M392 250c10-3 19 2 21 12l3 16 10 6-6 10 4 64 6 86h-16l-7-70-4 70h-18l5-92-5-58-7-7 6-9 3-15c1-8 4-12 5-13z"/>
    <path d="M407 268l22 12-3 8-20-9z"/>
    <rect x="386" y="300" width="9" height="70"/>
  </g>

  <!-- glitch -->
  <rect x="0" y="86" width="800" height="7" fill="#19e3ff" opacity="0.55"/>
  <rect x="250" y="78" width="300" height="3" fill="#ff2e88" opacity="0.7"/>

  <!-- wordmark -->
  <text x="400" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="58" fill="url(#cpName)" letter-spacing="1" stroke="#1a0a0a" stroke-width="1">CYBERPUNK</text>
  <text x="400" y="158" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="800"
        font-size="26" fill="none" stroke="#fcee0a" stroke-width="1.4" letter-spacing="20">2077</text>
</svg>
