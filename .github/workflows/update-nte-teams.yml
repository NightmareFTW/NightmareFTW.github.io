name: Update Neverness to Everness teams

on:
  schedule:
    - cron: "45 7 * * 1"   # weekly, Monday 07:45 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nte-teams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape NTE team comps (Prydwen)
        run: node scripts/update-nte-teams.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/nte"
          message: "chore: auto-update NTE team comps"
