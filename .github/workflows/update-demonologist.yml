name: Update Demonologist data

on:
  schedule:
    - cron: "35 7 * * 2"   # weekly, Tuesday 07:35 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-demonologist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scrape Demonologist demons, evidence & tools
        run: node scripts/update-demonologist.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/demonologist"
          message: "chore: auto-update Demonologist data"
