name: Update Demonologist data

on:
  schedule:
    - cron: "35 7 * * 2"   # weekly, Tuesday 07:35 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-demonologist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scrape Demonologist demons, evidence & tools
        run: node scripts/update-demonologist.js
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/demonologist)" ]; then
            git add data/demonologist
            git commit -m "chore: auto-update Demonologist data"
            git push
          else
            echo "No Demonologist changes."
          fi
