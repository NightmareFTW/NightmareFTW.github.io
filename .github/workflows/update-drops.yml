name: Update Warframe drop table

on:
  schedule:
    - cron: "0 7 * * 1"   # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-drops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build drop table
        run: node scripts/update-drops.js
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/warframe)" ]; then
            git add data/warframe
            git commit -m "chore: auto-update Warframe drop table"
            git push
          else
            echo "No drop changes."
          fi
