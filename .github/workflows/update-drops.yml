name: Update Warframe drop table

on:
  schedule:
    - cron: "0 7 * * 1"   # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-drops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Build drop table
        run: node scripts/update-drops.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/warframe"
          message: "chore: auto-update Warframe drop table"
