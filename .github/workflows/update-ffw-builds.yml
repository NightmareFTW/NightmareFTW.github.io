name: Update Far Far West builds

on:
  schedule:
    - cron: "20 8 * * *"   # daily, 08:20 UTC (community votes shift)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ffw-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scrape Far Far West builds (wikily.gg)
        run: node scripts/update-ffw-builds.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/far-far-west/builds.json"
          message: "chore: auto-update Far Far West builds"
