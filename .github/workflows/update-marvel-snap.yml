name: Update Marvel Snap cards

on:
  schedule:
    - cron: "15 8 * * *"   # daily, 08:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-marvel-snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape Marvel Snap cards (Marvel Snap Zone)
        run: node scripts/update-marvel-snap.js
      - name: Scrape Marvel Snap codes (Marvel Snap Zone)
        run: node scripts/update-marvel-snap-codes.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/marvel-snap/cards.json data/codes/marvel-snap.json"
          message: "chore: auto-update Marvel Snap cards & codes"
