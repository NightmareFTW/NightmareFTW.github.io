name: Update Ravenswatch data

on:
  schedule:
    - cron: "50 7 * * 4"   # weekly, Thursday 07:50 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ravenswatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape Ravenswatch heroes, talents & magical objects
        run: node scripts/update-ravenswatch.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/ravenswatch"
          message: "chore: auto-update Ravenswatch data"
