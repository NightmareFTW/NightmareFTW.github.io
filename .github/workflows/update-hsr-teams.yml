name: Update Honkai Star Rail meta teams

on:
  schedule:
    - cron: "40 7 * * *"   # daily, 07:40 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hsr-teams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape HSR meta team comps (Game8)
        run: node scripts/update-hsr-teams.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/honkai-star-rail/teams.json"
          message: "chore: auto-update HSR meta team comps"
