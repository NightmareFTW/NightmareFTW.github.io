name: Update Honkai Star Rail character builds

on:
  schedule:
    - cron: "50 7 * * *"   # daily, 07:50 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hsr-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape HSR character builds (Game8)
        run: node scripts/update-hsr-builds.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/honkai-star-rail/builds.json"
          message: "chore: auto-update HSR character builds"
