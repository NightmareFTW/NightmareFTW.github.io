name: Update Honkai Star Rail character builds

on:
  schedule:
    - cron: "50 7 * * 1"   # weekly, Monday 07:50 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hsr-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Scrape HSR character builds (Game8)
        run: node scripts/update-hsr-builds.js
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/honkai-star-rail/builds.json)" ]; then
            git add data/honkai-star-rail/builds.json
            git commit -m "chore: auto-update HSR character builds"
            git push
          else
            echo "No build changes."
          fi
