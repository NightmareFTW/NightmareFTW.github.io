name: Update Dreamlight Valley data

on:
  schedule:
    - cron: "30 7 * * 1"   # weekly, Monday 07:30 UTC (Star Path reveals weekly)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ddv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Build DDV datasets
        run: |
          node scripts/update-furniture.js   # full furniture catalogue (items.js reads its count)
          node scripts/update-clothing.js    # full clothing catalogue
          node scripts/update-animals.js     # critters + companions
          node scripts/update-items.js
          node scripts/update-recipes.js   # reads items.json, run after it
          node scripts/update-starpath.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/dreamlight-valley"
          message: "chore: auto-update Dreamlight Valley data"
