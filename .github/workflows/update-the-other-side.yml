name: Update The Other Side data

on:
  schedule:
    - cron: "35 7 * * 4"   # weekly, Thursday 07:35 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-the-other-side:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Scrape The Other Side ghosts, evidence & equipment
        run: node scripts/update-the-other-side.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/the-other-side"
          message: "chore: auto-update The Other Side data"
