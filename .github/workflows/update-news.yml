name: Update game news

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fetch news
        run: node scripts/update-news.js
      - name: Refresh redemption codes (DDV wiki + Epic Seven)
        run: node scripts/update-codes.js
      - name: Refresh Outlast Trials trials & maps
        run: node scripts/update-outlast.js
      - name: Commit changes if any
        uses: ./.github/actions/commit-data
        with:
          paths: "data/news data/codes data/outlast-trials"
          message: "chore: auto-update game news, codes & Outlast data"
