name: Update game news

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch news
        run: node scripts/update-news.js
      - name: Refresh redemption codes (DDV wiki + Epic Seven)
        run: node scripts/update-codes.js
      - name: Refresh Outlast Trials trials & maps
        run: node scripts/update-outlast.js
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/news data/codes data/outlast-trials)" ]; then
            git add data/news data/codes data/outlast-trials
            git commit -m "chore: auto-update game news, codes & Outlast data"
            git push
          else
            echo "No data changes."
          fi
